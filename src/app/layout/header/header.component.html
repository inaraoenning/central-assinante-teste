<div class="navbar sticky top-0 bg-base-100 z-10 shadow-md gap-2">
  <!-- Burger menu (mobile) -->
  <div class="flex-none lg:hidden">
    <label for="left-sidebar-drawer" class="btn btn-square btn-ghost">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        class="inline-block w-5 h-5 stroke-current"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        ></path>
      </svg>
    </label>
  </div>

  <div class="flex-1">
    <h1 class="text-md font-semibold ml-2 lg:hidden md:text-base">Central do Assinante</h1>
  </div>

  <!-- Header Direito -->
  <div class="flex-none flex items-center gap-2">
    <div class="flex-1">
      <h1 class="text-sm font-regular ml-2 hidden sm:block">
        {{ clienteService.clienteAtual()?.nome }}
      </h1>
    </div>
    <!-- Seletor Tema -->
    <div class="dropdown dropdown-end z-10">
      <label tabindex="0" class="btn btn-ghost btn-circle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4.098 19.902a3.75 3.75 0 005.304 0l6.401-6.402M6.75 21A3.75 3.75 0 013 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 003.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008z"
          />
        </svg>
      </label>
      <div
        tabindex="0"
        class="dropdown-content bg-base-100 rounded-box z-[1]w-45 p-2 shadow-xl max-h-96 overflow-y-auto flex flex-col gap-1"
      >
        @for (theme of themes; track theme) {
          <button
            class="btn btn-sm btn-ghost justify-start capitalize"
            [class.btn-active]="currentTheme === theme"
            (click)="setTheme(theme)"
          >
            <!-- <div
              class="w-4 h-4 rounded-full border border-base-300"
              [attr.data-theme]="theme"
              style="background: hsl(var(--p))"
            ></div> -->
            {{ theme }}
          </button>
        }
      </div>
    </div>

    <!-- Notifications -->
    <!-- <button class="btn btn-ghost btn-circle" (click)="openNotifications()">
      <div class="indicator">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
          />
        </svg>
        <span class="badge badge-xs badge-primary indicator-item">{{
          notificacao.qtdeNaoLida()
        }}</span>
      </div>
    </button> -->

    <!-- Sair -->
    <div class="dropdown dropdown-end">
      <label onclick="my_modal_1.showModal()" tabindex="0" class="btn btn-ghost btn-circle avatar">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-log-out-icon lucide-log-out w-5 h-5"
        >
          <path d="m16 17 5-5-5-5" />
          <path d="M21 12H9" />
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        </svg>
      </label>
      <!-- modal -->
      <dialog id="my_modal_1" class="modal">
        <div class="modal-box">
          <h3 class="text-lg font-bold">Sair</h3>
          <p class="py-4">Deseja realmente sair?</p>
          <div class="modal-action">
            <form method="dialog" class="flex gap-3">
              <button class="btn">Fechar</button>
              <button class="btn btn-error" (click)="logout()">Sair</button>
            </form>
          </div>
        </div>
      </dialog>
    </div>
  </div>
</div>

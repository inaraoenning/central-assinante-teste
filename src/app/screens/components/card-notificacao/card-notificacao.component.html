<div class="cursor-pointer" [class.opacity-55]="notificacao.lida" (click)="onClick()">
  <div class="flex bg-base-200 py-4 px-4 rounded-lg gap-2 my-1">
    <div class="flex flex-col gap-2 w-full">
      <!-- Titulo e Indicador -->
      <div class="flex justify-between items-center">
        <span class="font-bold text-sm">{{ notificacao.titulo }}</span>

        @if (!notificacao.lida) {
          <!-- Ponto verde animado = não lida -->
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-success"></span>
          </span>
        }
      </div>

      <!-- Mensagem -->
      <span class="text-sm">{{ notificacao.mensagem }}</span>

      <!-- Data -->
      <span class="text-xs opacity-60">{{
        notificacao.dataCriacao | date: 'dd/MM/yyyy HH:mm'
      }}</span>
    </div>
  </div>
</div>

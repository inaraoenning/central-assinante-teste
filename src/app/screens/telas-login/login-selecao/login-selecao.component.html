<div class="min-h-screen bg-base-200 flex flex-col items-center justify-center py-6">
  <div class="card w-full max-w-sm shadow-xl bg-base-100">
    <div class="card-body">
      <!-- Cabeçalho -->
      <div class="text-center mb-4">
        <div
          class="w-24 h-24 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-3"
        >
          <!-- Company building icon -->
          <!-- <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg> -->

          <img class="p-2" src="assets/img/logo/logo2.png" alt="" />
        </div>
        <h1 class="text-2xl font-bold">Central do Assinante</h1>
        <p class="text-sm text-base-content/60 mt-1">
          Informe seu CPF/CNPJ para localizar sua empresa
        </p>
      </div>

      <!-- Formulário de busca — esconde quando provedores já foram carregados -->
      @if (provedores().length === 0) {
        <div class="space-y-3">
          <div class="form-control">
            <label class="label"><span class="label-text font-medium">CPF / CNPJ</span></label>
            <input
              type="text"
              name="username"
              [(ngModel)]="username"
              (keyup.enter)="onSubmit()"
              placeholder="Apenas números"
              class="input input-bordered w-full"
              id="selecao-cpf-input"
              autofocus
            />
          </div>

          @if (errorMessage) {
            <div class="alert alert-error py-3">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="stroke-current shrink-0 h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
              <span class="text-sm">{{ errorMessage }}</span>
            </div>
          }

          <div class="form-control mt-4">
            <button
              type="button"
              class="btn btn-primary w-full"
              [disabled]="loading"
              (click)="onSubmit()"
              id="btn-buscar-empresa"
            >
              @if (loading) {
                <span class="loading loading-spinner loading-sm"></span>
                Buscando...
              } @else {
                Continuar
              }
            </button>
          </div>
        </div>
      }

      <!-- Lista de provedores encontrados -->
      @if (provedores().length > 1) {
        <div class="space-y-2">
          <p class="text-sm text-center text-base-content/60 mb-3">Selecione a sua empresa:</p>
          <ul class="space-y-2">
            @for (provedor of provedores(); track provedor.dominio) {
              <li>
                <button
                  type="button"
                  class="w-full flex items-center gap-3 p-3 rounded-xl border border-base-300 hover:border-primary hover:bg-primary/5 transition-all cursor-pointer text-left"
                  (click)="selecionarProvedor(provedor)"
                  [id]="'btn-provedor-' + provedor.dominio"
                >
                  <!-- Logo -->
                  <div class="shrink-0">
                    @if (provedor.logoUrl) {
                      <img
                        [src]="provedor.logoUrl"
                        [alt]="provedor.nomeAmigavelEmpresa"
                        class="w-12 h-12 rounded-lg object-contain bg-base-200 p-1"
                        (error)="$any($event.target).style.display = 'none'"
                      />
                    } @else {
                      <div
                        class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center"
                      >
                        <span class="text-primary font-bold text-lg">
                          {{ provedor.nomeAmigavelEmpresa || provedor.nomeEmpresa }}
                        </span>
                      </div>
                    }
                  </div>

                  <!-- Info -->
                  <div class="flex-1 min-w-0">
                    <p class="font-semibold text-base-content truncate">
                      {{ provedor.nomeAmigavelEmpresa || provedor.nomeEmpresa }}
                    </p>
                    @if (provedor.telefoneEmpresa) {
                      <p class="text-xs text-base-content/50">{{ provedor.telefoneEmpresa }}</p>
                    }
                  </div>

                  <!-- Seta -->
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 text-base-content/30 shrink-0"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 5l7 7-7 7"
                    />
                  </svg>
                </button>
              </li>
            }
          </ul>

          <!-- Botão para refazer a busca -->
          <button
            type="button"
            class="btn btn-ghost btn-sm w-full mt-2 text-base-content/50"
            (click)="provedores.set([]); username = ''"
          >
            ← Buscar outro CPF/CNPJ
          </button>
        </div>
      }
    </div>
  </div>
</div>

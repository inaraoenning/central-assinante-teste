<div class="min-h-screen bg-base-200 flex flex-col items-center justify-center py-6">
  <div class="card w-full max-w-sm shadow-xl bg-base-100">
    <div class="card-body">
      <!-- Stepper visual -->
      <ul class="steps w-full mb-6 text-xs">
        <li class="step step-primary">Identificar</li>
        <li class="step step-primary">Confirmar</li>
        <li class="step">Nova Senha</li>
      </ul>

      <div class="text-center mb-4">
        <div
          class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-3"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-7 w-7 text-primary"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
        </div>
        <h1 class="text-xl font-bold text-base-content">Confirmar Identidade</h1>
        <p class="text-sm text-base-content/60 mt-1">
          Olá, <strong>{{ nome }}</strong
          >! Um link de redefinição será enviado para o seu e-mail cadastrado.
        </p>
      </div>

      <!-- Exibir e-mail mascarado -->
      @if (emailMascarado) {
        <div class="bg-base-200 rounded-xl p-4 text-center mb-4">
          <p class="text-xs text-base-content/50 uppercase font-bold tracking-widest">
            E-mail de destino
          </p>
          <p class="text-base font-semibold text-base-content mt-1">{{ emailMascarado }}</p>
        </div>
      }

      @if (errorMessage) {
        <div class="alert alert-error py-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="stroke-current shrink-0 h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <span class="text-sm">{{ errorMessage }}</span>
        </div>
      }

      <div class="form-control mt-4">
        <button
          type="button"
          class="btn btn-primary w-full"
          [disabled]="loading"
          (click)="enviar()"
          id="btn-enviar-email"
        >
          @if (loading) {
            <span class="loading loading-spinner loading-sm"></span>
            Enviando...
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
              />
            </svg>
            Enviar Link por E-mail
          }
        </button>
      </div>

      <p class="text-center text-sm mt-4">
        <a routerLink="/forgot-password" class="link link-hover text-base-content/60">← Voltar</a>
      </p>
    </div>
  </div>
</div>
